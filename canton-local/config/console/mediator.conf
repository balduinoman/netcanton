canton {
  # required for key export
  features {
    enable-preview-commands = yes
  }
  parameters {
    manual-start = no
    non-standard-config = yes
    timeouts.processing.slow-future-warn = 20.seconds
  }

  mediators {
    mediator {
      init = {
          generate-topology-transactions-and-keys = true
          identity.type = auto
      }
      topology.validate-initial-topology-snapshot = false

      sequencer-client {
        acknowledgement-interval = 10m
        use-new-connection-pool = true
        enable-amplification-improvements = true
      }

      storage {
        type = postgres
        config {
          url = "jdbc:postgresql://localhost:8431/mediator"
          user = "canton"
          password = "canton"
          databaseName = "mediator"
          currentSchema = "mediator"		  
        }
      }

      monitoring.grpc-health-server {
        address = "0.0.0.0"
        port = 5062
      }

      admin-api {
        address = "0.0.0.0"
        port = 5007
      }
    }
  }
}